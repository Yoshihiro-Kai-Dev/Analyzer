<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>
  <!-- 角丸の背景 -->
  <rect width="32" height="32" rx="7" fill="url(#grad)"/>
  <!-- 棒グラフ（左から右へ昇順・分析ツールらしさを表現） -->
  <rect x="5"    y="22" width="5.5" height="6"  rx="1.5" fill="white" opacity="0.65"/>
  <rect x="13.3" y="16" width="5.5" height="12" rx="1.5" fill="white" opacity="0.82"/>
  <rect x="21.5" y="8"  width="5.5" height="20" rx="1.5" fill="white"/>
  <!-- トレンドラインの折れ線 -->
  <polyline
    points="7.75,21  16.05,14  24.25,6.5"
    stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"
    opacity="0.5" fill="none"
  />
  <!-- トレンドラインの先端ドット -->
  <circle cx="24.25" cy="6.5" r="1.5" fill="white" opacity="0.85"/>
</svg>
