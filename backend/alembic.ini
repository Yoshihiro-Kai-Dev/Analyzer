# Alembic 設定ファイル
[alembic]
# マイグレーションスクリプトの場所
script_location = alembic

# DB接続URLは env.py で環境変数から動的に設定するため、ここはダミー
sqlalchemy.url = postgresql://postgres:password@localhost/wel_analyzer

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
